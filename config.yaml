pipeline:
  direction: douyin_to_tiktok
  batch_size: 5
  schedule_interval_minutes: 300
  cleanup_after_upload: true
  timezone: Asia/Shanghai
  max_workers: 2
downloader:
  f2_config: /home/l/CascadeProjects/douyin-tiktok-pipeline/my_apps.yaml
  douyin_user_url: https://www.douyin.com/user/MS4wLjABAAAAIqILq-NyYIpuilGwRbYCqmpoMnTG6sxCIMYe-93UrjM?from_tab_name=main&vid=7633763820439467441
  tiktok_user_url: ''
  download_dir: ./download
  timeout: 120
  download_delay: 3
deduplicator:
  enable_dedup: false
  output_dir: ./dedup
  flip_horizontal: true
  rotation_angle: 0.0
  crop_percentage: 0.02
  saturation: 1.05
  brightness: 0.03
  contrast: 1.05
  fade_in_frames: 5
  fade_out_frames: 15
  top_blur_percentage: 0
  bottom_blur_percentage: 0
  side_blur_percentage: 0
  include_hzh: false
  hzh_opacity: 0.1
  hzh_scale: 0.3
  hzh_video_file: ''
  include_watermark: false
  watermark_text: ''
  replace_audio: false
  bgm_dir: /home/l/CascadeProjects/douyin-tiktok-pipeline/assets/bgm
  random_bgm: true
  bgm_volume: 0.15
  ffmpeg_preset: ultrafast
  ffmpeg_crf: 28
uploader:
  social_auto_upload_path: /home/l/CascadeProjects/douyin-tiktok-pipeline/social-auto-upload
  account_name: default
  headless: false
  timeout: 300
  upload_delay: [30, 30]  # [min_seconds, max_seconds] 上传间隔随机范围
  tiktok_tags: ["dance", "beautiful girl"]
  douyin_category: ''
database:
  db_path: ./state.db
  retention_days: 0
logging:
  level: INFO
  log_dir: ./logs
